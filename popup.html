<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="popup.css">

</head>
<body>

  <div class="content">

    <div class="open-btns-row">
      <button class="sellers-btn" id="openSellersBtn">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/>
          <path d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/>
        </svg>
        /sellers.json
      </button>
      <button class="sellers-btn" id="openBuyersBtn">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/>
          <path d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/>
        </svg>
        /buyers.json
      </button>
    </div>

    <div class="card">
      <div class="card-label">Syntax Colors</div>
      <div class="color-grid">
        <label class="color-item">
          <div class="color-swatch"><input type="color" id="keyColor"></div>
          <span class="color-name">Keys</span>
        </label>
        <label class="color-item">
          <div class="color-swatch"><input type="color" id="strColor"></div>
          <span class="color-name">Strings</span>
        </label>
        <label class="color-item">
          <div class="color-swatch"><input type="color" id="numColor"></div>
          <span class="color-name">Numbers</span>
        </label>
        <label class="color-item">
          <div class="color-swatch"><input type="color" id="boolColor"></div>
          <span class="color-name">Booleans</span>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Display</div>
      <div class="toggle-list">
        <div class="toggle-row">
          <label class="toggle-label" for="showPanel">Overview Panel</label>
          <label class="switch"><input type="checkbox" id="showPanel"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="themeToggle">Light Theme</label>
          <label class="switch"><input type="checkbox" id="themeToggle"><span class="switch-track"></span></label>
        </div>
      </div>

      <div class="card-divider"></div>
      <div class="mini-label">Stat Counters</div>

      <div class="toggle-list">
        <div class="toggle-row">
          <label class="toggle-label" for="showDomainList">Domain List</label>
          <label class="switch"><input type="checkbox" id="showDomainList"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showNameList">Name List</label>
          <label class="switch"><input type="checkbox" id="showNameList"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showTotalSellers">Total Sellers/Buyers</label>
          <label class="switch"><input type="checkbox" id="showTotalSellers"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showUniqueSellers">Unique Sellers/Buyers</label>
          <label class="switch"><input type="checkbox" id="showUniqueSellers"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showInvalidDomains">Invalid Domains</label>
          <label class="switch"><input type="checkbox" id="showInvalidDomains"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showInvalidAds">Invalid ads.txt</label>
          <label class="switch"><input type="checkbox" id="showInvalidAds"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showInvalidAppAds">Invalid app-ads.txt</label>
          <label class="switch"><input type="checkbox" id="showInvalidAppAds"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showTotalInvalid">Total Invalid</label>
          <label class="switch"><input type="checkbox" id="showTotalInvalid"><span class="switch-track"></span></label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showTotalFound">Total Found</label>
          <label class="switch"><input type="checkbox" id="showTotalFound"><span class="switch-track"></span></label>
        </div>
      </div>
    </div>

    <button class="save-btn" id="saveBtn">Save & Reload</button>
  </div>

  <div class="footer">
    <span class="footer-text">Open-source project</span>
    <a class="footer-link" href="https://github.com/OstinUA/Sellers.json-Inspector" target="_blank">
      GitHub
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>

  <script src="shared-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
