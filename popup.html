<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; width: 280px; padding: 15px; background: #1e1e1e; color: #fff; margin: 0; }
    .title { font-weight: bold; margin-bottom: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #9cdcfe; }
    .section { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
    input[type="color"] { cursor: pointer; border: none; background: none; width: 24px; height: 24px; padding: 0; }
    button { width: 100%; padding: 10px; background: #3794ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; }
    button:hover { background: #2a7bdb; }
  </style>
</head>
<body>
  <div class="title">Inspector Settings</div>
  
  <div class="section">
    <div class="row"><label>Keys Color</label><input type="color" id="keyColor"></div>
    <div class="row"><label>Strings Color</label><input type="color" id="strColor"></div>
    <div class="row"><label>Numbers Color</label><input type="color" id="numColor"></div>
  </div>

  <div class="section">
    <div class="row"><label>Show Overview Panel</label><input type="checkbox" id="showPanel"></div>
    <div class="row"><label>Total Sellers</label><input type="checkbox" id="showTotalSellers"></div>
    <div class="row"><label>Unique Sellers</label><input type="checkbox" id="showUniqueSellers"></div>
    <div class="row"><label>Invalid Domains</label><input type="checkbox" id="showInvalidDomains"></div>
    <div class="row"><label>Invalid ads.txt</label><input type="checkbox" id="showInvalidAds"></div>
    <div class="row"><label>Invalid app-ads.txt</label><input type="checkbox" id="showInvalidAppAds"></div>
    <div class="row"><label>Total Invalid Sellers</label><input type="checkbox" id="showTotalInvalid"></div>
    <div class="row"><label>Total Found Sellers</label><input type="checkbox" id="showTotalFound"></div>
  </div>

  <button id="saveBtn">Save & Reload</button>

  <script src="popup.js"></script>
</body>
</html>
